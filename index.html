<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultArt Cálculo de Custos de Materiais</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topo">
        <div class="logo">
            <img src="logo.png" alt="Logo da MultArt">
            </div>
        <h1>MULTART CÁLCULO DE CUSTOS DE MATERIAIS</h1>
    </header>

    <main class="container">

        <div class="card">
            <h3>ADESIVOS</h3>
            <br>
            <br>
            <input type="text" id="altura-adesivo" placeholder="ALTURA (cm)">
            <br>
            <span>X</span>
            <input type="text" id="largura-adesivo" placeholder="LARGURA (cn)">
            <br>
            <br>
            <button data-tipo="adesivo"class="btn">CALCULAR</button>
            <br>
            <br>
            <div class="resultado">
                <p id="resultado-adesivo">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>PVC</h3>
            <br>
            <br>
            <input type="text" id="altura-pvc" placeholder="ALTURA (cm)">
            <br>
            <span>X</span>
            <input type="text" id="largura-pvc" placeholder="LARGURA (cm)">
            <br>
            <br>
            <button data-tipo="pvc" class="btn">CALCULAR</button>
            <br>
            <br>
            <div class="resultado">
                <p id="resultado-pvc">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>PVC REFLETIVO</h3>
            <br>
            <br>
            <input type="text" id="altura-pvcRefletivo" placeholder="ALTURA (cm)">
            <br>
            <span>X</span>
            <input type="text" id="largura-pvcRefletivo" placeholder="LARGURA (cm)">
            <br>
            <br>
            <button data-tipo="pvcRefletivo" class="btn">CALCULAR</button>
            <br>
            <br>
            <div class="resultado">
                <p id="resultado-pvcRefletivo">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>PVC FOTOLUMINESCENTE</h3>
            <br>
            <input type="text" id="altura-pvcFoto" placeholder="ALTURA (cm)">
            <br>
            <span>X</span>
            <input type="text" id="largura-pvcFoto" placeholder="LARGURA (cm)">
            <br>
            <br>
            <button data-tipo="pvcFoto" class="btn">CALCULAR</button>
            <br>
            <br>
            <div class="resultado">
                <p id="resultado-pvcFoto">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>GALVANIZADO</h3>
            <br>
            <br>
            <input type="text" id="altura-galvanizado" placeholder="ALTURA (cm)">
            <br>
            <span>X</span>
            <input type="text" id="largura-galvanizado" placeholder="LARGURA(cm)">
            <br>
            <br>
            <button data-tipo="galvanizado"class="btn">CALCULAR</button>
            <br>
            <br>
            <div class="resultado">
                <p id="resultado-galvanizado">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>GALVANIZADO REFLETIVO</h3>
            <br>
            <input type="text" id="altura-galvanizadoRefletivo" placeholder="ALTURA (cm)">
            <br>
            <span>X</span>
            <input type="text" id="largura-galvanizadoRefletivo" placeholder="LARGURA (cm)">
            <br>
            <br>
            <button  data-tipo="galvanizadoRefletivo" class="btn">CALCULAR</button>
            <br>
            <br>
            <div class="resultado">
                <p id="resultado-galvanizadoRefletivo">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>ACM</h3>
            <br>
            <br>
            <input type="text" id="altura-acm" placeholder="ALTURA (cm)">
            <br>
            <span>X</span>
            <input type="text" id="largura-acm" placeholder="LARGURA (cm)">
            <br>
            <br>
            <button data-tipo="acm"class="btn">CALCULAR</button>
            <br>
            <br>
            <div class="resultado">
                <p id="resultado-acm">VALOR: R$ </p>
            </div>
        </div>
        <div class="card">
            <h3>ACM REFLETIVO</h3>
            <br>
            <br>
            <input type="text" id="altura-acmRefletivo" placeholder="ALTURA (cm)">
            <br>
            <span>X</span>
            <input type="text" id="largura-acmRefletivo" placeholder="LARGURA (cm)">
            <br>
            <br>
            <button data-tipo="acmRefletivo" class="btn">CALCULAR</button>
            <br>
            <br>
            <div class="resultado">
                <p id="resultado-acmRefletivo">VALOR: R$ </p>
            </div>
        </div>
    </main>
    <script  src="script.js"></script>
</body>
</html>
