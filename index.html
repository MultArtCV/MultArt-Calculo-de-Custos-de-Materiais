<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultArt Cálculo de Custos de Materiais</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topo">
        <div class="logo">
            <img src="logo.png" alt="Logo da MultArt">
        </div>
        <h1>CÁLCULO DE CUSTOS DE MATERIAIS</h1>
    </header>

    <main class="container">

        <div class="card">
            <h3>ADESIVOS</h3>
            <br><br>

            <label for="altura-adesivo">ALTURA (cm)</label>
            <input type="text" id="altura-adesivo">
            <br>

            <span>X</span>

            <label for="largura-adesivo">LARGURA (cm)</label>
            <input type="text" id="largura-adesivo">
            <br><br>

            <button data-tipo="adesivo" class="btn">CALCULAR</button>
            <br><br>

            <div class="resultado">
                <p id="resultado-adesivo">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>PVC</h3>
            <br><br>

            <label for="altura-pvc">ALTURA (cm)</label>
            <input type="text" id="altura-pvc">
            <br>

            <span>X</span>

            <label for="largura-pvc">LARGURA (cm)</label>
            <input type="text" id="largura-pvc">
            <br><br>

            <button data-tipo="pvc" class="btn">CALCULAR</button>
            <br><br>

            <div class="resultado">
                <p id="resultado-pvc">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>PVC REFLETIVO</h3>
            <br><br>

            <label for="altura-pvcRefletivo">ALTURA (cm)</label>
            <input type="text" id="altura-pvcRefletivo">
            <br>

            <span>X</span>

            <label for="largura-pvcRefletivo">LARGURA (cm)</label>
            <input type="text" id="largura-pvcRefletivo">
            <br><br>

            <button data-tipo="pvcRefletivo" class="btn">CALCULAR</button>
            <br><br>

            <div class="resultado">
                <p id="resultado-pvcRefletivo">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>PVC FOTOLUMINESCENTE</h3>
            <br>

            <label for="altura-pvcFoto">ALTURA (cm)</label>
            <input type="text" id="altura-pvcFoto">
            <br>

            <span>X</span>

            <label for="largura-pvcFoto">LARGURA (cm)</label>
            <input type="text" id="largura-pvcFoto">
            <br><br>

            <button data-tipo="pvcFoto" class="btn">CALCULAR</button>
            <br><br>

            <div class="resultado">
                <p id="resultado-pvcFoto">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>GALVANIZADO</h3>
            <br><br>

            <label for="altura-galvanizado">ALTURA (cm)</label>
            <input type="text" id="altura-galvanizado">
            <br>

            <span>X</span>

            <label for="largura-galvanizado">LARGURA (cm)</label>
            <input type="text" id="largura-galvanizado">
            <br><br>

            <button data-tipo="galvanizado" class="btn">CALCULAR</button>
            <br><br>

            <div class="resultado">
                <p id="resultado-galvanizado">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>GALVANIZADO REFLETIVO</h3>
            <br>

            <label for="altura-galvanizadoRefletivo">ALTURA (cm)</label>
            <input type="text" id="altura-galvanizadoRefletivo">
            <br>

            <span>X</span>

            <label for="largura-galvanizadoRefletivo">LARGURA (cm)</label>
            <input type="text" id="largura-galvanizadoRefletivo">
            <br><br>

            <button data-tipo="galvanizadoRefletivo" class="btn">CALCULAR</button>
            <br><br>

            <div class="resultado">
                <p id="resultado-galvanizadoRefletivo">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>ACM</h3>
            <br><br>

            <label for="altura-acm">ALTURA (cm)</label>
            <input type="text" id="altura-acm">
            <br>

            <span>X</span>

            <label for="largura-acm">LARGURA (cm)</label>
            <input type="text" id="largura-acm">
            <br><br>

            <button data-tipo="acm" class="btn">CALCULAR</button>
            <br><br>

            <div class="resultado">
                <p id="resultado-acm">VALOR: R$ </p>
            </div>
        </div>

        <div class="card">
            <h3>ACM REFLETIVO</h3>
            <br><br>

            <label for="altura-acmRefletivo">ALTURA (cm)</label>
            <input type="text" id="altura-acmRefletivo">

            <span>X</span>

            <label for="largura-acmRefletivo">LARGURA (cm)</label>

            <div class="resultado">
                <p id="resultado-acmRefletivo">VALOR: R$ </p>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
